name: Update README with Time

on:
  schedule:
    - cron: "*/1 * * * *" # Runs every 5 minutes
  workflow_dispatch: # Manual trigger for the action

jobs:
  update_readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Update README with current time
        run: |
          DATE=$(date +"%T")  # Get the current time in HH:MM:SS format
          sed -i "s/{{DATE}}/$DATE/" README.md  # Replace the placeholder with the current time

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update README with current time"
          git push
